services:
  postgres:
    image: postgres:16
    container_name: mfg_quality_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-manufacturing}
      POSTGRES_USER: ${POSTGRES_USER:-manufacturing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-manufacturing}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:v0.50.31
    platform: linux/amd64
    container_name: mfg_quality_metabase
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data

  api:
    build: .
    container_name: mfg_quality_api
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
  metabase_data: